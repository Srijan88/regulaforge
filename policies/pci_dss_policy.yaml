version: '1.0'
policy_name: pci-dss-quick-reference-pdf
default_action: ALLOW
ingress_rules:
- name: deny_card_data_via_insecure_channels
  description: Prohibit the transmission of cardholder data over insecure channels like email, as required
    by usage policies for critical technologies.
  priority: 95
  action: DENY
  conditions:
  - field: contains_pii
    match_type: boolean
    value: true
  - field: risk_score
    match_type: threshold
    value: 0.4
  deny_message: '[REGULAFORGE] BLOCKED: Prohibit the transmission of cardholder data over insecure channels
    like email, as required by usage policies for critical technologies.. [pci_dss_quick_reference.pdf.pdf
    §12.3]'
- name: block_unprotected_pan_transmission
  description: Prohibits sending unprotected Primary Account Numbers (PANs) via end-user messaging technologies
    like chat, as required by PCI DSS.
  priority: 94
  action: DENY
  conditions:
  - field: contains_pii
    match_type: boolean
    value: true
  - field: risk_score
    match_type: threshold
    value: 0.4
  deny_message: '[REGULAFORGE] BLOCKED: Prohibits sending unprotected Primary Account Numbers (PANs) via
    end-user messaging technologies like chat, as required by PCI DSS.. [pci_dss_quick_reference.pdf.pdf
    §4.2]'
- name: prohibit_unsecured_media_creation
  description: Prohibits requests that would create insecure physical or digital media containing cardholder
    data, such as printing, exporting, or downloading raw card data.
  priority: 94
  action: DENY
  conditions:
  - field: contains_system_commands
    match_type: boolean
    value: true
  deny_message: '[REGULAFORGE] BLOCKED: Prohibits requests that would create insecure physical or digital
    media containing cardholder data, such as printing, exporting, or downloading raw card data.. [pci_dss_quick_reference.pdf.pdf
    §Requirement 9]'
- name: block_bulk_pan_retrieval
  description: To enforce the 'need-to-know' principle, bulk retrieval or listing of all Primary Account
    Numbers (PANs) is strictly prohibited. Access must be limited to specific accounts required for a
    job function.
  priority: 92
  action: DENY
  conditions:
  - field: contains_pii_request
    match_type: boolean
    value: true
  - field: risk_score
    match_type: threshold
    value: 0.4
  deny_message: '[REGULAFORGE] BLOCKED: To enforce the ''need-to-know'' principle, bulk retrieval or listing
    of all Primary Account Numbers (PANs) is strictly prohibited. Access must be limited to specific accounts
    required for a job function.. [pci_dss_quick_reference.pdf.pdf §7.1]'
- name: deny_untrusted_network_traffic_config
  description: Prohibits configuring network access to allow traffic from untrusted networks or hosts,
    enforcing a deny-by-default security posture for the cardholder data environment.
  priority: 75
  action: DENY
  conditions:
  - field: contains_system_commands
    match_type: boolean
    value: true
  deny_message: '[REGULAFORGE] BLOCKED: Prohibits configuring network access to allow traffic from untrusted
    networks or hosts, enforcing a deny-by-default security posture for the cardholder data environment..
    [pci_dss_quick_reference.pdf.pdf §1.2]'
- name: block_direct_database_queries
  description: Blocks attempts by users to perform direct or raw SQL-like queries against databases containing
    cardholder data, bypassing programmatic access controls.
  priority: 75
  action: DENY
  conditions:
  - field: contains_system_commands
    match_type: boolean
    value: true
  deny_message: '[REGULAFORGE] BLOCKED: Blocks attempts by users to perform direct or raw SQL-like queries
    against databases containing cardholder data, bypassing programmatic access controls.. [pci_dss_quick_reference.pdf.pdf
    §8.7]'
- name: prohibit_direct_public_access_to_cde
  description: Prohibits creating direct public access from the Internet to any system component in the
    cardholder data environment (CDE).
  priority: 74
  action: DENY
  conditions:
  - field: contains_system_commands
    match_type: boolean
    value: true
  deny_message: '[REGULAFORGE] BLOCKED: Prohibits creating direct public access from the Internet to any
    system component in the cardholder data environment (CDE).. [pci_dss_quick_reference.pdf.pdf §1.3]'
- name: prevent_disabling_personal_firewalls
  description: Prevents disabling personal firewall software on endpoint devices that are used to access
    the cardholder data environment from outside the corporate network.
  priority: 73
  action: DENY
  conditions:
  - field: contains_system_commands
    match_type: boolean
    value: true
  deny_message: '[REGULAFORGE] BLOCKED: Prevents disabling personal firewall software on endpoint devices
    that are used to access the cardholder data environment from outside the corporate network.. [pci_dss_quick_reference.pdf.pdf
    §1.4]'
- name: enforce_default_deny_for_broad_data_access
  description: Access to cardholder data is denied by default. This rule blocks overly broad or unjustified
    queries for cardholder data, enforcing the principle of default deny.
  priority: 73
  action: DENY
  conditions:
  - field: contains_pii
    match_type: boolean
    value: true
  deny_message: '[REGULAFORGE] BLOCKED: Access to cardholder data is denied by default. This rule blocks
    overly broad or unjustified queries for cardholder data, enforcing the principle of default deny..
    [pci_dss_quick_reference.pdf.pdf §Requirement 7]'
- name: block_default_credential_usage
  description: Prohibits the use of common vendor-supplied default passwords for authentication or system
    access requests.
  priority: 72
  action: DENY
  conditions:
  - field: contains_credentials
    match_type: boolean
    value: true
  deny_message: '[REGULAFORGE] BLOCKED: Prohibits the use of common vendor-supplied default passwords
    for authentication or system access requests.. [pci_dss_quick_reference.pdf.pdf §2.1]'
- name: prohibit_enabling_default_accounts
  description: Prevents enabling or using unnecessary default accounts like 'guest' or 'anonymous' which
    should be disabled as per security best practices.
  priority: 71
  action: DENY
  conditions:
  - field: contains_credentials
    match_type: boolean
    value: true
  deny_message: '[REGULAFORGE] BLOCKED: Prevents enabling or using unnecessary default accounts like ''guest''
    or ''anonymous'' which should be disabled as per security best practices.. [pci_dss_quick_reference.pdf.pdf
    §2.1]'
- name: restrict_unauthorized_system_component_access
  description: Access to system components and configurations in the Cardholder Data Environment is restricted.
    This rule blocks attempts to query or modify system settings, logs, or security configurations.
  priority: 71
  action: DENY
  conditions:
  - field: contains_pii
    match_type: boolean
    value: true
  deny_message: '[REGULAFORGE] BLOCKED: Access to system components and configurations in the Cardholder
    Data Environment is restricted. This rule blocks attempts to query or modify system settings, logs,
    or security configurations.. [pci_dss_quick_reference.pdf.pdf §Requirement 7]'
- name: deny_audit_log_tampering
  description: Prohibits any attempt to stop, pause, or disable audit logging mechanisms.
  priority: 71
  action: DENY
  conditions:
  - field: contains_system_commands
    match_type: boolean
    value: true
  deny_message: '[REGULAFORGE] BLOCKED: Prohibits any attempt to stop, pause, or disable audit logging
    mechanisms.. [pci_dss_quick_reference.pdf.pdf §10.2]'
- name: deny_unencrypted_admin_access
  description: Denies requests for non-console administrative access using unencrypted protocols like
    telnet or http, which are vulnerable to eavesdropping.
  priority: 70
  action: DENY
  conditions:
  - field: contains_credentials
    match_type: boolean
    value: true
  deny_message: '[REGULAFORGE] BLOCKED: Denies requests for non-console administrative access using unencrypted
    protocols like telnet or http, which are vulnerable to eavesdropping.. [pci_dss_quick_reference.pdf.pdf
    §2.3]'
- name: prohibit_shared_user_accounts
  description: Disallows requests to create or use shared, generic, or non-unique user accounts for accessing
    cardholder data, as each user must have a unique ID.
  priority: 70
  action: DENY
  conditions:
  - field: contains_pii
    match_type: boolean
    value: true
  deny_message: '[REGULAFORGE] BLOCKED: Disallows requests to create or use shared, generic, or non-unique
    user accounts for accessing cardholder data, as each user must have a unique ID.. [pci_dss_quick_reference.pdf.pdf
    §8.1]'
- name: deny_audit_trail_alteration
  description: Prohibits any attempt to alter, modify, or delete secured audit trails.
  priority: 70
  action: DENY
  conditions:
  - field: contains_system_commands
    match_type: boolean
    value: true
  deny_message: '[REGULAFORGE] BLOCKED: Prohibits any attempt to alter, modify, or delete secured audit
    trails.. [pci_dss_quick_reference.pdf.pdf §10.5]'
- name: block_cleartext_password_transmission
  description: Prevents users from sending cleartext passwords or passphrases to the AI agent, which violates
    the requirement to keep them unreadable during transmission.
  priority: 69
  action: DENY
  conditions:
  - field: contains_credentials
    match_type: boolean
    value: true
  deny_message: '[REGULAFORGE] BLOCKED: Prevents users from sending cleartext passwords or passphrases
    to the AI agent, which violates the requirement to keep them unreadable during transmission.. [pci_dss_quick_reference.pdf.pdf
    §8.2]'
- name: prohibit_ignoring_vulnerability_scan_failures
  description: Prohibits instructing the agent to ignore, suppress, or accept failing vulnerability scan
    results, particularly those rated high-risk or with a CVSS score of 4.0 or higher.
  priority: 69
  action: DENY
  conditions:
  - field: contains_system_commands
    match_type: boolean
    value: true
  deny_message: '[REGULAFORGE] BLOCKED: Prohibits instructing the agent to ignore, suppress, or accept
    failing vulnerability scan results, particularly those rated high-risk or with a CVSS score of 4.0
    or higher.. [pci_dss_quick_reference.pdf.pdf §11.2]'
- name: prevent_mfa_disablement
  description: Blocks any attempts to disable, turn off, or bypass multi-factor authentication (MFA) for
    any user, especially for remote or administrative access.
  priority: 68
  action: DENY
  conditions:
  - field: contains_credentials
    match_type: boolean
    value: true
  deny_message: '[REGULAFORGE] BLOCKED: Blocks any attempts to disable, turn off, or bypass multi-factor
    authentication (MFA) for any user, especially for remote or administrative access.. [pci_dss_quick_reference.pdf.pdf
    §8.3]'
- name: prohibit_disabling_intrusion_detection_systems
  description: Prevents any attempt to instruct the agent to disable, bypass, or silence alerts from network
    intrusion detection or prevention systems (IDS/IPS).
  priority: 68
  action: DENY
  conditions:
  - field: contains_system_commands
    match_type: boolean
    value: true
  deny_message: '[REGULAFORGE] BLOCKED: Prevents any attempt to instruct the agent to disable, bypass,
    or silence alerts from network intrusion detection or prevention systems (IDS/IPS).. [pci_dss_quick_reference.pdf.pdf
    §11.4]'
- name: block_weak_password_setting
  description: Prevents users from setting weak, common, or easily guessable passwords, in line with strong
    authentication principles.
  priority: 67
  action: DENY
  conditions:
  - field: contains_credentials
    match_type: boolean
    value: true
  deny_message: '[REGULAFORGE] BLOCKED: Prevents users from setting weak, common, or easily guessable
    passwords, in line with strong authentication principles.. [pci_dss_quick_reference.pdf.pdf §IDENTIFY
    AND AUTHENTICATE ALL USERS]'
- name: deny_shared_credential_use
  description: Prohibits attempts to authenticate or perform actions using shared, group, or generic user
    identifiers, as these are explicitly forbidden.
  priority: 66
  action: DENY
  conditions:
  - field: contains_credentials
    match_type: boolean
    value: true
  deny_message: '[REGULAFORGE] BLOCKED: Prohibits attempts to authenticate or perform actions using shared,
    group, or generic user identifiers, as these are explicitly forbidden.. [pci_dss_quick_reference.pdf.pdf
    §8.5]'
- name: prohibit_bypassing_network_segmentation_for_testing
  description: Denies requests to alter or disable network segmentation controls that isolate the cardholder
    data environment, even when requested for testing purposes.
  priority: 66
  action: DENY
  conditions:
  - field: contains_pii
    match_type: boolean
    value: true
  deny_message: '[REGULAFORGE] BLOCKED: Denies requests to alter or disable network segmentation controls
    that isolate the cardholder data environment, even when requested for testing purposes.. [pci_dss_quick_reference.pdf.pdf
    §11.3]'
- name: audit_unapproved_third_party_integration
  description: Attempts to share cardholder data with or configure integrations to external service providers
    must be audited to ensure they comply with vendor management policies.
  priority: 51
  action: LOG
  conditions:
  - field: contains_pii
    match_type: boolean
    value: true
- name: audit_potential_security_incident
  description: Messages indicating a potential security breach or incident must be logged and escalated
    to the incident response team for immediate review.
  priority: 50
  action: LOG
  conditions:
  - field: contains_credentials
    match_type: boolean
    value: true
- name: audit_administrative_actions
  description: Ensures all administrative actions, such as account creation or privilege changes, are
    logged for audit.
  priority: 49
  action: LOG
  conditions:
  - field: risk_score
    match_type: threshold
    value: 0.55
- name: audit_cardholder_data_access
  description: Ensures all access to cardholder data is logged for audit purposes, as required by PCI
    DSS.
  priority: 40
  action: LOG
  conditions:
  - field: contains_pii
    match_type: boolean
    value: true
- name: audit_discussions_of_security_testing
  description: Audits all conversations related to the planning, execution, or results of security tests,
    including penetration tests and vulnerability scans, for oversight.
  priority: 14
  action: LOG
  conditions:
  - field: contains_system_commands
    match_type: boolean
    value: true
egress_rules:
- name: prohibit_storage_of_track_data
  description: Prohibits storing full magnetic stripe track data (or equivalent on-chip data) after transaction
    authorization.
  priority: 95
  action: DENY
  conditions:
  - field: contains_credentials
    match_type: boolean
    value: true
  - field: risk_score
    match_type: threshold
    value: 0.4
  deny_message: '[REGULAFORGE] BLOCKED: Prohibits storing full magnetic stripe track data (or equivalent
    on-chip data) after transaction authorization.. [pci_dss_quick_reference.pdf.pdf §Table on Page 15]'
- name: prohibit_storage_of_cvv
  description: Prohibits storing sensitive authentication data such as CVV2, CVC2, or CID after a transaction
    has been authorized.
  priority: 89
  action: DENY
  conditions:
  - field: contains_credentials
    match_type: boolean
    value: true
  - field: risk_score
    match_type: threshold
    value: 0.4
  deny_message: '[REGULAFORGE] BLOCKED: Prohibits storing sensitive authentication data such as CVV2,
    CVC2, or CID after a transaction has been authorized.. [pci_dss_quick_reference.pdf.pdf §3.2]'
- name: prevent_full_pan_display
  description: Prevents the display of a full Primary Account Number (PAN). PAN must be masked to show
    no more than the first six and last four digits.
  priority: 88
  action: DENY
  conditions:
  - field: contains_pii_request
    match_type: boolean
    value: true
  - field: risk_score
    match_type: threshold
    value: 0.4
  deny_message: '[REGULAFORGE] BLOCKED: Prevents the display of a full Primary Account Number (PAN). PAN
    must be masked to show no more than the first six and last four digits.. [pci_dss_quick_reference.pdf.pdf
    §3.3]'
- name: prevent_unencrypted_pan_logging
  description: Prohibits storing or logging a full Primary Account Number (PAN) in a readable format.
    PAN must be rendered unreadable via hashing, truncation, or strong cryptography.
  priority: 87
  action: DENY
  conditions:
  - field: contains_pii
    match_type: boolean
    value: true
  - field: risk_score
    match_type: threshold
    value: 0.4
  deny_message: '[REGULAFORGE] BLOCKED: Prohibits storing or logging a full Primary Account Number (PAN)
    in a readable format. PAN must be rendered unreadable via hashing, truncation, or strong cryptography..
    [pci_dss_quick_reference.pdf.pdf §3.4]'
- name: prohibit_storage_of_pin
  description: Prohibits storing the cardholder's Personal Identification Number (PIN) or encrypted PIN
    block after transaction authorization.
  priority: 86
  action: DENY
  conditions:
  - field: contains_credentials
    match_type: boolean
    value: true
  - field: risk_score
    match_type: threshold
    value: 0.4
  deny_message: '[REGULAFORGE] BLOCKED: Prohibits storing the cardholder''s Personal Identification Number
    (PIN) or encrypted PIN block after transaction authorization.. [pci_dss_quick_reference.pdf.pdf §Table
    on Page 15]'
rate_limits:
  requests_per_minute: 60
  requests_per_hour: 500
  burst_threshold: 10
filesystem:
  denied_paths:
  - /etc/**
  - /root/**
  - '**/.ssh/**'
  - '**/.env'
  - '**/*secret*'
  - '**/*password*'
  - '**/*credential*'
